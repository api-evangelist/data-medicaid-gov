aid: data-medicaid-gov
name: Medicaid Open Data
description: >-
  Medicaid Open Data is a federal government open-data portal for United States running DKAN.
  It exposes the DKAN catalog API, a standardized machine-readable interface over approximately 255 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs DKAN, it shares a
  consistent API surface with every other DKAN portal, making it uniformly harvestable and integrable.
